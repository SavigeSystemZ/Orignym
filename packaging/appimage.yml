version: 1

script:
  - mkdir -p AppDir/usr/bin
  - mkdir -p AppDir/usr/share/applications
  - mkdir -p AppDir/usr/share/icons/hicolor/256x256/apps
  - install -Dm755 ./dist/orignym AppDir/usr/bin/orignym
  - install -Dm644 ./packaging/io.aiaast.orignym.desktop AppDir/usr/share/applications/io.aiaast.orignym.desktop

AppDir:
  path: ./AppDir
  app_info:
    id: io.aiaast.orignym
    name: Orignym
    icon: io.aiaast.orignym
    version: 0.1.0
    exec: usr/bin/orignym
    exec_args: "$@"

  runtime:
    env:
      APP_BIND_ADDRESS: 127.0.0.1
      APP_CONFIG_DIR: /etc/orignym
      APP_DATA_DIR: /var/lib/orignym

  test:
    fedora-latest:
      command: ./AppRun --version

AppImage:
  arch: x86_64
  update-information: guess
