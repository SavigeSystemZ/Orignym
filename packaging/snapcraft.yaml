name: orignym
base: core24
version: "0.1.0"
summary: Orignym packaged from an AIAST project scaffold
description: |
  Generic Snap scaffold for Orignym.
  Review plugs, confinement, and launch command before release.

grade: devel
confinement: strict

apps:
  orignym:
    command: bin/orignym
    plugs:
      - network
      - network-bind
      - home

parts:
  orignym:
    plugin: dump
    source: .
    organize:
      dist/orignym: bin/orignym
