services:
  app:
    build:
      context: ../../
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - ../env/.env
    network_mode: bridge
    ports:
      - "127.0.0.1:${APP_PORT:-3000}:3000"

  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: orignym
      POSTGRES_USER: orignym
      POSTGRES_PASSWORD: change-me
    ports:
      - "127.0.0.1:55432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data:
